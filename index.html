<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>系统升级维护</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 0px !important;
            transition: none !important;
            animation: none !important;
            box-shadow: none !important;
            text-shadow: none !important;
            scroll-behavior: auto !important;
        }

        body {
            background: #000000;
            background-image: url('https://file.shiorko.dpdns.org/file/ATRI.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
            line-height: 1.45;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            pointer-events: none;
            z-index: 0;
        }

        .upgrade-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid #000000;
            padding: 40px 36px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #000000;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #000000;
            display: inline-block;
            width: auto;
            line-height: 1.2;
        }

        .description {
            font-size: 16px;
            color: #1a1a1a;
            margin: 20px 0 32px 0;
            border-left: 3px solid #000000;
            padding-left: 18px;
            background: transparent;
            font-weight: 400;
            line-height: 1.5;
        }

        .eta-box {
            margin-top: 8px;
            padding: 18px 20px;
            background: #f7f7f7;
            border: 1px solid #c0c0c0;
            font-size: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
        }

        .eta-label {
            font-weight: 600;
            color: #000000;
            letter-spacing: 0.2px;
        }

        .eta-value {
            font-family: monospace;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #111;
            word-break: break-all;
            text-align: right;
        }

        a, button, input, div, span, p, h1, h2, h3, h4, section {
            border-radius: 0px !important;
            transition: none !important;
        }

        html {
            scroll-behavior: auto;
        }
    </style>
</head>
<body>
<div class="upgrade-container">
    <h1 class="title">系统升级维护</h1>
    <div class="description">
        当前网站正在执行核心版本升级，我们将优化架构并提升服务性能。
    </div>
    <div class="eta-box">
        <span class="eta-label">预计完成时间</span>
        <span class="eta-value">2026年5月3日 16:30 (UTC+8)</span>
    </div>
    <div class="eta-box" style="margin-top: 16px;">
        <span class="eta-label">当前时间</span>
        <span class="eta-value" id="current-time">--</span>
    </div>
    <div class="eta-box" style="margin-top: 16px;">
        <span class="eta-label">当前访问的链接</span>
        <span class="eta-value" id="page-url">--</span>
    </div>
</div>
<script>
    function updateCurrentTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const timeString = year + '年' + month + '月' + day + '日 ' + hours + ':' + minutes + ':' + seconds;
        const timeElement = document.getElementById('current-time');
        if (timeElement) {
            timeElement.textContent = timeString;
        }
    }

    function displayPageUrl() {
        const urlElement = document.getElementById('page-url');
        if (urlElement) {
            let rawUrl = window.location.href;
            try {
                rawUrl = decodeURIComponent(rawUrl);
            } catch(e) {
                console.warn("URL解码失败，保留原始链接");
            }
            urlElement.textContent = rawUrl;
        }
    }

    updateCurrentTime();
    setInterval(updateCurrentTime, 1000);
    displayPageUrl();
</script>
</body>
</html>
