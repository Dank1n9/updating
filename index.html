<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站维护中 - 稍后回来</title>
    <style>
        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 页面主体样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* 渐变背景 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 卡片容器 */
        .container {
            background: #fff;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in; /* 淡入动画 */
        }

        /* 图标样式 */
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: spin 4s linear infinite; /* 旋转动画 */
        }

        /* 标题 */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        /* 描述文字 */
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 2rem;
        }

        /* 底部小字 */
        .footer {
            font-size: 0.8rem;
            color: #999;
            margin-top: 2rem;
        }

        /* 动画定义 */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container { padding: 2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 这里是一个 SVG 齿轮图标 -->
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>

            </svg>
        </div>

        <h1>网站升级维护中</h1>
        <p>
            我们要暂时离开一会儿进行系统升级。<br>
            为了给您提供更好的体验，我们正在努力优化网站。<br>
            请稍后再回来看看！
        </p>
        
        <div class="footer">
            &copy; 2026 你的网站名称. 保留所有权利。
        </div>
    </div>

</body>
</html>
